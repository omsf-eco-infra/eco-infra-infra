name: Tofu Tests

on:
  pull_request:
    paths:
      - ".pre-commit-config.yaml"
      - ".github/workflows/tests.yaml"
      - "bootstrap/**"
      - "deploy-permissions/**"
      - "modules/**"
      - "tests/compatibility/**"
      - "tests/contracts/**"
  push:
    branches:
      - main
    paths:
      - ".pre-commit-config.yaml"
      - ".github/workflows/tests.yaml"
      - "bootstrap/**"
      - "deploy-permissions/**"
      - "modules/**"
      - "tests/compatibility/**"
      - "tests/contracts/**"
  workflow_dispatch:

env:
  TF_INPUT: "0"
  TF_IN_AUTOMATION: "true"

jobs:
  static-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Check OpenTofu formatting
        run: tofu fmt -check -recursive

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  fast-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    env:
      MODULE_TEST_DIRECTORIES: |
        bootstrap
        modules/github-oidc
        modules/internal/github-actions-aws-role
        modules/internal/repo-oidc-customization
        modules/tfstate-aws-backend
        tests/contracts/github-oidc
        tests/contracts/internal-github-actions-aws-role
        tests/contracts/repo-oidc-customization
        tests/contracts/tfstate-aws-backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Run fast module tests
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/tofu-plugin-cache
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          results=()
          failed_modules=()

          while IFS= read -r module; do
            test -n "$module" || continue
            echo "::group::$module"

            data_dir="${RUNNER_TEMP}/${module//\//-}"
            if ! TF_DATA_DIR="$data_dir" tofu -chdir="$module" init -backend=false -no-color; then
              result="Initialization failed"
              failed_modules+=("$module")
            elif ! TF_DATA_DIR="$data_dir" tofu -chdir="$module" validate -no-color; then
              result="Validation failed"
              failed_modules+=("$module")
            elif ! TF_DATA_DIR="$data_dir" tofu -chdir="$module" test -no-color; then
              result="Tests failed"
              failed_modules+=("$module")
            else
              result="Passed"
            fi

            results+=("$module|$result")
            echo "::endgroup::"
          done <<< "$MODULE_TEST_DIRECTORIES"

          {
            echo "## Fast module tests"
            echo
            echo "| Tier | Module | Result |"
            echo "| --- | --- | --- |"
            for entry in "${results[@]}"; do
              IFS="|" read -r module result <<< "$entry"
              echo "| Fast mocked | \`$module\` | $result |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

          if ((${#failed_modules[@]} > 0)); then
            failed_list=$(printf ", %s" "${failed_modules[@]}")
            failed_list=${failed_list:2}
            echo "::error title=Fast mocked tests failed::$failed_list"
            exit 1
          fi

  compatibility-endpoints:
    name: Compatibility (${{ matrix.tofu_label }}, ${{ matrix.provider_profile }} providers)
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - tofu_label: minimum OpenTofu
            tofu_version: 1.10.0
            provider_profile: minimum
          - tofu_label: latest OpenTofu
            tofu_version: latest
            provider_profile: latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up tested OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ matrix.tofu_version }}
          tofu_wrapper: false

      - name: Record OpenTofu version
        run: tofu version

      - name: Validate compatibility consumers
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/tofu-plugin-cache
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          tests/compatibility/run.sh "${{ matrix.provider_profile }}"

  compatibility-cross:
    name: Compatibility (${{ matrix.tofu_label }}, ${{ matrix.provider_profile }} providers)
    needs: static-checks
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - tofu_label: minimum OpenTofu
            tofu_version: 1.10.0
            provider_profile: latest
          - tofu_label: latest OpenTofu
            tofu_version: latest
            provider_profile: minimum

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up tested OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ matrix.tofu_version }}
          tofu_wrapper: false

      - name: Record OpenTofu version
        run: tofu version

      - name: Validate compatibility consumers
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/tofu-plugin-cache
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          tests/compatibility/run.sh "${{ matrix.provider_profile }}"

  aws-oidc-smoke:
    needs: [static-checks, fast-tests]
    if: >-
      success() && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository) ||
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_TEST_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: eco-infra-infra-tests-${{ github.run_id }}

      - name: Verify assumed role
        run: aws sts get-caller-identity
