name: Tofu Tests

on:
  pull_request:
    paths:
      - ".pre-commit-config.yaml"
      - ".github/workflows/tests.yaml"
      - "bootstrap/**"
      - "deploy-permissions/**"
      - "modules/**"
  push:
    branches:
      - main
    paths:
      - ".pre-commit-config.yaml"
      - ".github/workflows/tests.yaml"
      - "bootstrap/**"
      - "deploy-permissions/**"
      - "modules/**"
  workflow_dispatch:

env:
  TF_INPUT: "0"
  TF_IN_AUTOMATION: "true"

jobs:
  static-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Check OpenTofu formatting
        run: tofu fmt -check -recursive

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  fast-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    env:
      MODULE_TEST_DIRECTORIES: |
        bootstrap
        modules/github-oidc
        modules/internal/github-actions-aws-role
        modules/internal/repo-oidc-customization
        modules/tfstate-aws-backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Run fast module tests
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/tofu-plugin-cache
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          status=0

          while IFS= read -r module; do
            test -n "$module" || continue
            echo "::group::$module"

            data_dir="${RUNNER_TEMP}/${module//\//-}"
            if ! TF_DATA_DIR="$data_dir" tofu -chdir="$module" init -backend=false -no-color; then
              status=1
            elif ! TF_DATA_DIR="$data_dir" tofu -chdir="$module" test -no-color; then
              status=1
            fi

            echo "::endgroup::"
          done <<< "$MODULE_TEST_DIRECTORIES"

          exit "$status"

  aws-oidc-smoke:
    needs: fast-tests
    if: >-
      success() && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository) ||
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_TEST_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: eco-infra-infra-tests-${{ github.run_id }}

      - name: Verify assumed role
        run: aws sts get-caller-identity
